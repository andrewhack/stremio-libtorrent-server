# Standalone nginx config: terminate TLS on 12470 and proxy to the uvicorn app on 11470.
# Run with: nginx -c /srv/app/docker/nginx-tls.conf -g 'daemon off;'
worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;
events { worker_connections 1024; }

http {
    access_log off;
    sendfile on;
    client_max_body_size 0;           # allow large POSTs (settings, uploads)
    proxy_temp_path /tmp/nginx-proxy;
    client_body_temp_path /tmp/nginx-body;

    server {
        listen 12470 ssl http2;
        server_name _;

        # certificates.pem holds the full chain + private key (stremio layout)
        ssl_certificate     /root/.stremio-server/certificates.pem;
        ssl_certificate_key /root/.stremio-server/certificates.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://127.0.0.1:11470;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffering off;          # stream byte ranges without buffering
            proxy_request_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
