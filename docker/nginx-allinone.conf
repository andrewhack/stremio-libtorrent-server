# All-in-one: nginx serves the Stremio web player AND proxies the streaming API to uvicorn,
# on a single origin per scheme — HTTP :8080 (LAN) and HTTPS :12470 (cert). No mixed content.
worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx-allinone.pid;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log off;
    sendfile on;

    # Compress text payloads (HLS playlists, subtitles, JSON, web assets). Video/segments are
    # already compressed, so only these benefit — keeps playlist/subtitle fetches snappy.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types application/vnd.apple.mpegurl application/x-mpegurl text/vtt
               application/json application/javascript text/css text/plain text/xml;
    client_max_body_size 0;
    proxy_temp_path /tmp/nx-proxy;
    client_body_temp_path /tmp/nx-body;

    server {
        listen 8080;                       # HTTP (LAN, no cert)
        include /srv/app/docker/nginx-locations.inc;
    }

    server {
        listen 12470 ssl http2;            # HTTPS (cert: BYO or auto self-signed); nginx 1.18 syntax
        ssl_certificate     /root/.stremio-server/certificates.pem;
        ssl_certificate_key /root/.stremio-server/certificates.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        include /srv/app/docker/nginx-locations.inc;
    }
}
